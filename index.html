<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Operator's Physical Controller Drone Sim</title>
  <!-- A-Frame 1.5.0 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  
  <script>
    // Component to make platforms and objects float up and down
    AFRAME.registerComponent('oscillate', {
      schema: {
        speed: {type: 'number', default: 1},
        amount: {type: 'number', default: 0.5},
        offset: {type: 'number', default: 0}
      },
      init: function() { 
        this.baseY = this.el.object3D.position.y; 
      },
      tick: function(time) {
        this.el.object3D.position.y = this.baseY + Math.sin(time / 1000 * this.data.speed + this.data.offset) * this.data.amount;
      }
    });

    // Operator's DJI-Style Motion Controller Matrix
    AFRAME.registerComponent('drone-flight-controller', {
      schema: {
        rig: { type: 'selector', default: '#rig' },
        drone: { type: 'selector', default: '#drone' },
        rightController: { type: 'selector', default: '#rightHand' },
        hudState: { type: 'selector', default: '#hud-state' },
        hudCompass: { type: 'selector', default: '#hud-compass' },
        hudAlt: { type: 'selector', default: '#hud-alt' },
        hudSpd: { type: 'selector', default: '#hud-spd' },
        props: { type: 'selectorAll', default: '.propeller' }
      },

      init: function () {
        // Core state machine: DISARMED -> ARMED <-> FLYING/HOVER
        this.state = 'DISARMED';
        
        // Physics and tracking vectors
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.droneTilt = new THREE.Vector3(0, 0, 0); 
        this.droneYaw = 0; 
        this.thrust = 0;
        
        // First Person View Offset
        this.cameraOffset = { distance: -0.15, height: 0.05 }; 
        
        // Calibration storage for the physical controller
        this.baseQuatInv = new THREE.Quaternion();
        this.needsCalibration = false;
        
        this.updateHUD('SYSTEM OFFLINE\nPress A button to ARM');

        // Hardware Event Listeners
        const rc = this.data.rightController;
        
        // Analog trigger for thrust
        rc.addEventListener('triggerchanged', (e) => {
          this.thrust = e.detail.value;
        });

        // A Button to arm/disarm and set center
        rc.addEventListener('abuttondown', (e) => {
          if (this.state === 'DISARMED') {
            this.state = 'ARMED';
            this.needsCalibration = true; // Flags the tick loop to grab the physical room orientation
            this.updateHUD('ARMED\nSqueeze Trigger to FLY');
          } else {
            this.state = 'DISARMED';
            this.updateHUD('SYSTEM OFFLINE\nPress A button to ARM');
          }
        });
      },

      updateHUD: function(text) {
        if (this.data.hudState) {
          this.data.hudState.setAttribute('value', text);
          
          if(this.state === 'DISARMED') this.data.hudState.setAttribute('color', '#ff3333');
          if(this.state === 'ARMED') this.data.hudState.setAttribute('color', '#ffaa00');
          if(this.state === 'FLYING') this.data.hudState.setAttribute('color', '#00ffff');
          if(this.state === 'HOVER') this.data.hudState.setAttribute('color', '#00aaff');
        }
      },

      spinProps: function(speed) {
        for (let i = 0; i < this.data.props.length; i++) {
          let rot = this.data.props[i].object3D.rotation;
          rot.y += speed;
        }
      },

      tick: function (time, timeDelta) {
        const dt = timeDelta / 1000; 
        if (dt === 0) return;

        // Visual feedback based on state
        if (this.state === 'ARMED') this.spinProps(0.1);
        if (this.state === 'HOVER') this.spinProps(0.3);
        if (this.state === 'FLYING') this.spinProps(0.6 + (this.thrust * 0.4));

        const sceneEl = this.el.sceneEl;
        if (!sceneEl.is('vr-mode')) return; 

        const frame = sceneEl.frame;
        const renderer = sceneEl.renderer;
        if (!frame || !renderer.xr.getSession()) return;

        const session = renderer.xr.getSession();
        const refSpace = renderer.xr.getReferenceSpace();

        // Locate the right physical controller hardware source
        let rightHandSource = null;
        for (let source of session.inputSources) {
          if (source.handedness === 'right' && source.gripSpace) {
            rightHandSource = source;
            break;
          }
        }

        // Process Physical Controller Data
        if (rightHandSource) {
          const pose = frame.getPose(rightHandSource.gripSpace, refSpace);
          if (pose) {
            // This is the absolute physical rotation of the controller in your living room.
            // It is completely unaffected by the virtual drone spinning around.
            const rawQuat = new THREE.Quaternion().copy(pose.transform.orientation);

            // Calibrate 'Zero' Center when user hits ARM
            if (this.needsCalibration) {
              this.baseQuatInv.copy(rawQuat).invert();
              this.needsCalibration = false;
            }

            if (this.state === 'ARMED' || this.state === 'FLYING' || this.state === 'HOVER') {
              
              // Automatic State switching based on trigger squeeze
              if (this.thrust > 0.05 && (this.state === 'HOVER' || this.state === 'ARMED')) {
                this.state = 'FLYING';
                this.updateHUD('FLYING\nTilt to steer');
              } else if (this.thrust <= 0.05 && this.state === 'FLYING') {
                this.state = 'HOVER';
                this.updateHUD('HOVER\nSqueeze Trigger to fly');
              }

              // --- KINEMATICS MATH ---
              // Calculate rotational deviation from the calibrated 'Zero' center
              const deltaQuat = new THREE.Quaternion().multiplyQuaternions(this.baseQuatInv, rawQuat);
              // Convert to Euler using YXZ order to prevent roll/yaw coupling artifacts
              const deltaEuler = new THREE.Euler().setFromQuaternion(deltaQuat, 'YXZ');

              let ctrlPitch = deltaEuler.x;
              let ctrlRoll = deltaEuler.z;

              // Deadzones to prevent micro-jitters
              const dz = 0.08;
              ctrlPitch = Math.abs(ctrlPitch) > dz ? ctrlPitch - Math.sign(ctrlPitch)*dz : 0;
              ctrlRoll = Math.abs(ctrlRoll) > dz ? ctrlRoll - Math.sign(ctrlRoll)*dz : 0;

              // Map physical tilt to drone flight surfaces
              let targetPitch = ctrlPitch * 0.85;
              let targetRoll = ctrlRoll * 0.85;
              let targetYawVel = ctrlRoll * -1.8; // Twisting right drops Roll(Z) negative -> maps to turning right

              // Interpolate visual tilt
              const tiltLerp = 6.0 * dt; 
              this.droneTilt.x += (targetPitch - this.droneTilt.x) * tiltLerp;
              this.droneTilt.z += (targetRoll - this.droneTilt.z) * tiltLerp;
              this.droneYaw += targetYawVel * dt;

              this.data.drone.object3D.rotation.x = this.droneTilt.x;
              this.data.drone.object3D.rotation.z = this.droneTilt.z;

              // Apply Thrust Vectoring
              if (this.state === 'FLYING') {
                const maxSpeed = 16.0; 
                const currentThrust = this.thrust * maxSpeed;

                // Grab the drone's current absolute forward direction (including its visual pitch)
                const droneQuat = this.data.drone.object3D.quaternion;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(droneQuat);

                // Push velocity along the nose vector
                const targetVel = forward.multiplyScalar(currentThrust);
                this.velocity.lerp(targetVel, 2.5 * dt); // Momentum smooth
              } else {
                // Auto-brake in hover mode
                this.velocity.lerp(new THREE.Vector3(0,0,0), 3.0 * dt);
                this.droneTilt.multiplyScalar(0.95); // Auto-level
              }
            }
          }
        }

        // Apply physical gravity/braking if completely disarmed
        if (this.state === 'DISARMED') {
          this.droneTilt.multiplyScalar(0.9);
          this.velocity.lerp(new THREE.Vector3(0,-4,0), 2.0 * dt); // Fall out of sky
          this.data.drone.object3D.rotation.x = this.droneTilt.x; 
          this.data.drone.object3D.rotation.z = this.droneTilt.z; 
        }

        // Move the drone body
        this.data.drone.object3D.position.x += this.velocity.x * dt;
        this.data.drone.object3D.position.y += this.velocity.y * dt;
        this.data.drone.object3D.position.z += this.velocity.z * dt;

        // Hard floor collision
        if (this.data.drone.object3D.position.y < 0.1) {
          this.data.drone.object3D.position.y = 0.1;
          if (this.velocity.y < 0) this.velocity.y = 0;
        }

        // Update Yaw mesh
        this.data.drone.object3D.rotation.y = this.droneYaw;

        // --- TELEMETRY DATA PUSH TO HUD ---
        if (this.data.hudCompass && this.data.hudAlt && this.data.hudSpd) {
          let headingDegrees = -(this.droneYaw * 180 / Math.PI) % 360;
          if (headingDegrees < 0) headingDegrees += 360;
          let hdgStr = Math.round(headingDegrees).toString().padStart(3, '0');
          this.data.hudCompass.setAttribute('value', `HDG [ ${hdgStr} ]`);

          let altStr = this.data.drone.object3D.position.y.toFixed(1);
          this.data.hudAlt.setAttribute('value', `ALT\n${altStr}m`);

          let spdStr = this.velocity.length().toFixed(1);
          this.data.hudSpd.setAttribute('value', `SPD\n${spdStr}`);
        }

        // --- FIRST PERSON CAMERA TRACKING ---
        const dronePos = this.data.drone.object3D.position;
        const rigPos = this.data.rig.object3D.position;
        const rigRot = this.data.rig.object3D.rotation;
        
        const targetRigX = dronePos.x + Math.sin(this.droneYaw) * this.cameraOffset.distance;
        const targetRigZ = dronePos.z + Math.cos(this.droneYaw) * this.cameraOffset.distance;
        
        rigPos.set(targetRigX, dronePos.y + this.cameraOffset.height, targetRigZ);
        rigRot.set(0, this.droneYaw, 0);
      }
    });
  </script>
</head>
<body>
  <!-- Dark synthwave/abstract background and deep fog -->
  <a-scene drone-flight-controller background="color: #030308" fog="type: exponential; color: #030308; density: 0.025">
    
    <!-- Giant wireframe floor -->
    <a-plane rotation="-90 0 0" width="400" height="400" color="#00ffff" wireframe="true" opacity="0.15"></a-plane>

    <!-- ABSTRACT FLOATING GEOMETRY GARDEN -->
    <!-- Platform 1: Central Hub -->
    <a-entity position="0 4 -12" oscillate="speed: 1.2; amount: 0.8; offset: 0">
      <a-cylinder segments-radial="6" radius="4" height="0.4" color="#111" wireframe="false"></a-cylinder>
      <a-cylinder segments-radial="6" radius="4.1" height="0.45" color="#00ffff" wireframe="true"></a-cylinder>
      <a-icosahedron color="#ff00ff" wireframe="true" radius="1.2" position="0 2 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-icosahedron>
      <a-octahedron color="#00ffff" opacity="0.5" radius="0.5" position="0 2 0" animation="property: rotation; to: 360 0 360; loop: true; dur: 4000; easing: linear"></a-octahedron>
    </a-entity>

    <!-- Platform 2: High Right -->
    <a-entity position="12 8 -25" oscillate="speed: 0.8; amount: 1.5; offset: 2.5">
      <a-cylinder segments-radial="6" radius="3" height="0.4" color="#111" wireframe="false"></a-cylinder>
      <a-cylinder segments-radial="6" radius="3.1" height="0.45" color="#00ffaa" wireframe="true"></a-cylinder>
      <a-cone radius-bottom="0.8" radius-top="0" segments-radial="4" height="2" color="#00ffaa" wireframe="true" position="0 1 0"></a-cone>
      <a-cone radius-bottom="0" radius-top="0.8" segments-radial="4" height="2" color="#00ffaa" wireframe="true" position="0 3 0"></a-cone>
    </a-entity>

    <!-- Platform 3: Low Left -->
    <a-entity position="-15 5 -20" oscillate="speed: 1.5; amount: 0.6; offset: 1.2">
      <a-cylinder segments-radial="6" radius="5" height="0.4" color="#111" wireframe="false"></a-cylinder>
      <a-cylinder segments-radial="6" radius="5.1" height="0.45" color="#ff00ff" wireframe="true"></a-cylinder>
      <a-dodecahedron color="#ff00ff" wireframe="true" radius="1.5" position="0 1.5 0" animation="property: rotation; to: -360 360 0; loop: true; dur: 12000; easing: linear"></a-dodecahedron>
      <a-dodecahedron color="#00ffff" wireframe="true" radius="0.8" position="2 1 2" animation="property: rotation; to: 0 360 360; loop: true; dur: 6000; easing: linear"></a-dodecahedron>
      <a-dodecahedron color="#00ffaa" wireframe="true" radius="1.0" position="-2 2 -1" animation="property: rotation; to: 360 0 -360; loop: true; dur: 9000; easing: linear"></a-dodecahedron>
    </a-entity>

    <!-- Angular Training Rings (Octagonal) -->
    <a-entity id="training-course">
      <a-torus position="0 1.5 -6" radius="1.2" tube="0.05" segments-tubular="8" color="#00ffaa" rotation="0 0 0" opacity="0.8"></a-torus>
      <a-torus position="5 4.0 -18" radius="1.5" tube="0.05" segments-tubular="8" color="#ff00ff" rotation="0 -30 0" opacity="0.8"></a-torus>
      <a-torus position="-8 6.0 -28" radius="1.5" tube="0.05" segments-tubular="8" color="#00ffff" rotation="0 45 0" opacity="0.8"></a-torus>
      <a-torus position="10 9.0 -40" radius="2.0" tube="0.05" segments-tubular="8" color="#00ffaa" rotation="0 -60 0" opacity="0.8"></a-torus>
    </a-entity>

    <!-- The Drone Entity -->
    <a-entity id="drone" position="0 1.5 -2">
      <a-box color="#222" width="0.2" height="0.08" depth="0.2"></a-box>
      <a-box color="#00ffaa" width="0.2" height="0.02" depth="0.05" position="0 0.04 -0.1"></a-box>

      <a-cylinder color="#555" radius="0.01" height="0.2" position="-0.15 0 -0.15" rotation="90 45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="-0.22 0.03 -0.22" opacity="0.8"></a-cylinder>
      
      <a-cylinder color="#555" radius="0.01" height="0.2" position="0.15 0 -0.15" rotation="90 -45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="0.22 0.03 -0.22" opacity="0.8"></a-cylinder>

      <a-cylinder color="#555" radius="0.01" height="0.2" position="-0.15 0 0.15" rotation="90 -45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="-0.22 0.03 0.22" opacity="0.8"></a-cylinder>

      <a-cylinder color="#555" radius="0.01" height="0.2" position="0.15 0 0.15" rotation="90 45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="0.22 0.03 0.22" opacity="0.8"></a-cylinder>
    </a-entity>

    <!-- Player Rig: This moves with the drone -->
    <a-entity id="rig" position="0 0 0">
      
      <!-- Camera / Head -->
      <a-camera id="head" position="0 1.6 0">
        
        <!-- J.A.R.V.I.S. Style Tactical HUD -->
        <a-entity id="iron-man-hud" position="0 0 -0.8">
          <a-ring color="#00ffff" radius-inner="0.03" radius-outer="0.035" opacity="0.6"></a-ring>
          <a-ring color="#00ffff" radius-inner="0.08" radius-outer="0.082" opacity="0.3" theta-length="60" theta-start="60"></a-ring>
          <a-ring color="#00ffff" radius-inner="0.08" radius-outer="0.082" opacity="0.3" theta-length="60" theta-start="240"></a-ring>
          <a-circle color="#ff3333" radius="0.003" opacity="0.8"></a-circle>

          <a-entity line="start: -0.4 0.3 0; end: 0.4 0.3 0; color: #00ffff; opacity: 0.3"></a-entity>
          <a-entity line="start: -0.4 -0.3 0; end: 0.4 -0.3 0; color: #00ffff; opacity: 0.3"></a-entity>

          <a-text id="hud-compass" position="0 0.32 0" value="HDG [ 000 ]" align="center" width="1.2" color="#00ffff" font="monoid" opacity="0.9"></a-text>
          <a-text id="hud-alt" position="0.45 0 0" value="ALT\n0.0m" align="center" width="1.2" color="#00ffff" font="monoid" opacity="0.9"></a-text>
          <a-text id="hud-spd" position="-0.45 0 0" value="SPD\n0.0" align="center" width="1.2" color="#00ffff" font="monoid" opacity="0.9"></a-text>
          <a-text id="hud-state" position="0 -0.35 0" value="INITIALIZING..." align="center" width="0.9" color="#ff3333" font="monoid"></a-text>
        </a-entity>
      </a-camera>

      <!-- Physical Controller Models -->
      <a-entity id="leftHand" oculus-touch-controls="hand: left; model: true;"></a-entity>
      <a-entity id="rightHand" oculus-touch-controls="hand: right; model: true;"></a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
