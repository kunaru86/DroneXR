<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Operator's Hand-Tracked Drone Sim</title>
  <!-- A-Frame 1.5.0 is required for stable WebXR hand tracking on Quest 3 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Environment component for a basic landscape -->
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  <script>
    // Operator's Custom WebXR Hand Tracking Flight Controller
    AFRAME.registerComponent('drone-flight-controller', {
      schema: {
        rig: { type: 'selector', default: '#rig' },
        drone: { type: 'selector', default: '#drone' },
        hud: { type: 'selector', default: '#hud' },
        props: { type: 'selectorAll', default: '.propeller' }
      },

      init: function () {
        // Core state machine: DISARMED -> ARMED -> FLYING
        this.state = 'DISARMED';
        
        // Physics and tracking vectors to avoid garbage collection stutters
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.cameraOffset = new THREE.Vector3(0, 0.5, 2.0); // 2m behind, 0.5m above
        this.upVector = new THREE.Vector3();
        this.baseVector = new THREE.Vector3(0, 1, 0);
        this.wristQuat = new THREE.Quaternion();

        this.updateHUD('DISARMED\nMake a fist to ARM');
      },

      updateHUD: function(text) {
        if (this.data.hud) {
          this.data.hud.setAttribute('value', text);
          
          // Color coding for organic readability
          if(this.state === 'DISARMED') this.data.hud.setAttribute('color', '#ff3333');
          if(this.state === 'ARMED') this.data.hud.setAttribute('color', '#ffaa00');
          if(this.state === 'FLYING') this.data.hud.setAttribute('color', '#00ff00');
        }
      },

      spinProps: function(speed) {
        for (let i = 0; i < this.data.props.length; i++) {
          let rot = this.data.props[i].object3D.rotation;
          rot.y += speed;
        }
      },

      tick: function (time, timeDelta) {
        const dt = timeDelta / 1000; // Delta time in seconds
        if (dt === 0) return;

        // Visual feedback based on state
        if (this.state === 'ARMED') this.spinProps(0.1);
        if (this.state === 'FLYING') this.spinProps(0.5);

        // Access raw WebXR session to bypass A-Frame's abstraction lag
        const sceneEl = this.el.sceneEl;
        if (!sceneEl.is('vr-mode')) return; // Only process if in headset

        const frame = sceneEl.frame;
        const renderer = sceneEl.renderer;
        if (!frame || !renderer.xr.getSession()) return;

        const session = renderer.xr.getSession();
        const refSpace = renderer.xr.getReferenceSpace();

        // Locate the right hand input source
        let rightHandSource = null;
        for (let source of session.inputSources) {
          if (source.hand && source.handedness === 'right') {
            rightHandSource = source;
            break;
          }
        }

        if (!rightHandSource) {
          if (this.state !== 'DISARMED') {
             this.state = 'DISARMED';
             this.updateHUD('TRACKING LOST\nDisarmed');
          }
          return;
        }

        // --- GESTURE RECOGNITION (FIST MATH) ---
        // Get raw joint poses for wrist, index tip, and pinky tip
        const wristPose = frame.getJointPose(rightHandSource.hand.get('wrist'), refSpace);
        const indexPose = frame.getJointPose(rightHandSource.hand.get('index-finger-tip'), refSpace);
        const pinkyPose = frame.getJointPose(rightHandSource.hand.get('pinky-finger-tip'), refSpace);

        if (!wristPose || !indexPose || !pinkyPose) return;

        // Calculate distance from wrist to fingertips
        const dxI = wristPose.transform.position.x - indexPose.transform.position.x;
        const dyI = wristPose.transform.position.y - indexPose.transform.position.y;
        const dzI = wristPose.transform.position.z - indexPose.transform.position.z;
        const distIndex = Math.sqrt(dxI*dxI + dyI*dyI + dzI*dzI);

        const dxP = wristPose.transform.position.x - pinkyPose.transform.position.x;
        const dyP = wristPose.transform.position.y - pinkyPose.transform.position.y;
        const dzP = wristPose.transform.position.z - pinkyPose.transform.position.z;
        const distPinky = Math.sqrt(dxP*dxP + dyP*dyP + dzP*dzP);

        // Thresholds in meters
        // Calibrated for human hands. Quest 3 tracks the wrist lower than the physical palm.
        // A closed fist puts fingertips roughly 8-11cm from the wrist tracking joint.
        // An open hand extends them to 15-20cm.
        const isFist = distIndex < 0.11 && distPinky < 0.11;
        const isOpen = distIndex > 0.15 && distPinky > 0.15;

        // --- STATE MACHINE ---
        if (this.state === 'DISARMED' && isFist) {
          this.state = 'ARMED';
          this.updateHUD('ARMED\nOpen hand to FLY');
        } else if (this.state === 'ARMED' && isOpen) {
          this.state = 'FLYING';
          this.updateHUD('FLYING\nTilt hand to move. Fist to stop.');
        } else if (this.state === 'FLYING' && isFist) {
          this.state = 'DISARMED'; // Emergency kill switch
          this.updateHUD('EMERGENCY STOP\nDisarmed');
        }

        // --- FLIGHT KINEMATICS ---
        if (this.state === 'FLYING') {
          // Extract the wrist orientation to determine hand tilt
          this.wristQuat.copy(wristPose.transform.orientation);
          
          // Apply quaternion to a standard 'up' vector (back of the hand)
          this.upVector.copy(this.baseVector).applyQuaternion(this.wristQuat);

          // Map vector axes to drone velocity. 
          // Note: In WebXR, hand orientations can vary slightly, but generally 
          // tilting forward changes the Z of the back-of-hand normal, tilting sideways changes X.
          const maxSpeed = 5.0; // meters per second
          const deadzone = 0.1;

          // Z-axis of normal controls forward/back
          let targetVZ = this.upVector.z * maxSpeed;
          // X-axis of normal controls left/right strafe
          let targetVX = this.upVector.x * maxSpeed;

          // Apply deadzone so minor twitches don't cause drift
          if (Math.abs(targetVZ) < deadzone) targetVZ = 0;
          if (Math.abs(targetVX) < deadzone) targetVX = 0;

          // Smooth velocity transition (acceleration/momentum)
          this.velocity.z += (targetVZ - this.velocity.z) * 0.05;
          this.velocity.x += (targetVX - this.velocity.x) * 0.05;

          // Apply velocity to drone
          this.data.drone.object3D.position.x += this.velocity.x * dt;
          this.data.drone.object3D.position.z += this.velocity.z * dt;

          // Tilt drone model visually based on velocity
          this.data.drone.object3D.rotation.x = this.velocity.z * 0.1;
          this.data.drone.object3D.rotation.z = -this.velocity.x * 0.1;
        } else {
          // Decelerate if not flying
          this.velocity.multiplyScalar(0.9);
          this.data.drone.object3D.position.x += this.velocity.x * dt;
          this.data.drone.object3D.position.z += this.velocity.z * dt;
          this.data.drone.object3D.rotation.set(0,0,0);
        }

        // --- THIRD PERSON CAMERA TRACKING ---
        // Force the entire rig (camera + hands) to follow the drone
        const dronePos = this.data.drone.object3D.position;
        const rigPos = this.data.rig.object3D.position;
        
        // Target rig position is behind and above the drone
        const targetX = dronePos.x + this.cameraOffset.x;
        const targetY = dronePos.y + this.cameraOffset.y;
        const targetZ = dronePos.z + this.cameraOffset.z;

        // Strict follow - no interpolation on Z/X to prevent the drone drifting away from the camera
        // In third person VR, keeping the relationship locked reduces visual desync.
        rigPos.set(targetX, targetY, targetZ);
      }
    });
  </script>
</head>
<body>
  <!-- Scene with Hand Tracking enabled in WebXR -->
  <a-scene webxr="optionalFeatures: hand-tracking;" drone-flight-controller background="color: #87CEEB">
    
    <!-- Procedural Landscape -->
    <a-entity environment="preset: default; groundColor: #445; grid: none; dressingAmount: 100"></a-entity>

    <!-- The Drone Entity -->
    <a-entity id="drone" position="0 1.5 -2">
      <!-- Core Body -->
      <a-box color="#333" width="0.2" height="0.08" depth="0.2"></a-box>
      <!-- Front Indicator (so you know which way is forward) -->
      <a-box color="#f00" width="0.2" height="0.02" depth="0.05" position="0 0.04 -0.1"></a-box>

      <!-- Arms and Propellers -->
      <!-- Front Left -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="-0.15 0 -0.15" rotation="90 45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="-0.22 0.03 -0.22" opacity="0.8"></a-cylinder>
      
      <!-- Front Right -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="0.15 0 -0.15" rotation="90 -45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="0.22 0.03 -0.22" opacity="0.8"></a-cylinder>

      <!-- Back Left -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="-0.15 0 0.15" rotation="90 -45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="-0.22 0.03 0.22" opacity="0.8"></a-cylinder>

      <!-- Back Right -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="0.15 0 0.15" rotation="90 45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="0.22 0.03 0.22" opacity="0.8"></a-cylinder>
    </a-entity>

    <!-- Player Rig: This moves with the drone -->
    <a-entity id="rig" position="0 0 0">
      
      <!-- Camera / Head -->
      <a-camera id="head" position="0 1.6 0">
        <!-- HUD locked to the user's face -->
        <a-text id="hud" 
                position="0 -0.3 -0.6" 
                value="WAITING FOR VR" 
                align="center" 
                width="0.8" 
                color="#fff"
                font="monoid"
                wrap-count="30">
        </a-text>
      </a-camera>

      <!-- Hand Models -->
      <a-entity id="leftHand" hand-tracking-controls="hand: left;"></a-entity>
      <a-entity id="rightHand" hand-tracking-controls="hand: right; modelColor: #44aa44;"></a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
