<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Operator's Hand-Tracked Drone Sim</title>
  <!-- A-Frame 1.5.0 is required for stable WebXR hand tracking on Quest 3 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Environment component for a basic landscape -->
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  <script>
    // Operator's Custom WebXR Hand Tracking Flight Controller
    AFRAME.registerComponent('drone-flight-controller', {
      schema: {
        rig: { type: 'selector', default: '#rig' },
        drone: { type: 'selector', default: '#drone' },
        hudState: { type: 'selector', default: '#hud-state' },
        hudCompass: { type: 'selector', default: '#hud-compass' },
        hudAlt: { type: 'selector', default: '#hud-alt' },
        hudSpd: { type: 'selector', default: '#hud-spd' },
        props: { type: 'selectorAll', default: '.propeller' }
      },

      init: function () {
        // Core state machine: DISARMED -> ARMED -> FLYING <-> HOVER
        this.state = 'DISARMED';
        
        // Physics and tracking vectors
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.droneTilt = new THREE.Vector3(0, 0, 0); 
        this.droneYaw = 0; 
        
        // MOVED TO FRONT: Negative distance places it ahead of the drone (First Person View)
        this.cameraOffset = { distance: -0.15, height: 0.05 }; 
        
        // Virtual Joystick Anchors for Positional Control
        this.anchorRight = new THREE.Vector3();
        this.anchorLeft = new THREE.Vector3();
        
        // Anti-nausea / Anti-acrobatics limits
        this.maxTilt = 0.35; // Maximum radians the drone is allowed to tilt (approx 20 degrees)
        this.maxYawSpeed = 0.6; // Severely nerfed yaw speed

        this.updateHUD('SYSTEM OFFLINE\nMake right fist to ARM');
      },

      updateHUD: function(text) {
        if (this.data.hudState) {
          this.data.hudState.setAttribute('value', text);
          
          if(this.state === 'DISARMED') this.data.hudState.setAttribute('color', '#ff3333');
          if(this.state === 'ARMED') this.data.hudState.setAttribute('color', '#ffaa00');
          if(this.state === 'FLYING') this.data.hudState.setAttribute('color', '#00ffff');
          if(this.state === 'HOVER') this.data.hudState.setAttribute('color', '#00aaff');
        }
      },

      spinProps: function(speed) {
        for (let i = 0; i < this.data.props.length; i++) {
          let rot = this.data.props[i].object3D.rotation;
          rot.y += speed;
        }
      },

      tick: function (time, timeDelta) {
        const dt = timeDelta / 1000; 
        if (dt === 0) return;

        if (this.state === 'ARMED') this.spinProps(0.1);
        if (this.state === 'HOVER') this.spinProps(0.3);
        if (this.state === 'FLYING') this.spinProps(0.6);

        const sceneEl = this.el.sceneEl;
        if (!sceneEl.is('vr-mode')) return; 

        const frame = sceneEl.frame;
        const renderer = sceneEl.renderer;
        if (!frame || !renderer.xr.getSession()) return;

        const session = renderer.xr.getSession();
        const refSpace = renderer.xr.getReferenceSpace();

        let rightHandSource = null;
        let leftHandSource = null;
        for (let source of session.inputSources) {
          if (source.hand) {
            if (source.handedness === 'right') rightHandSource = source;
            if (source.handedness === 'left') leftHandSource = source;
          }
        }

        let trackingLost = true;
        let rightWristPose, indexPose, pinkyPose, leftWristPose;

        if (rightHandSource && leftHandSource) {
          rightWristPose = frame.getJointPose(rightHandSource.hand.get('wrist'), refSpace);
          indexPose = frame.getJointPose(rightHandSource.hand.get('index-finger-tip'), refSpace);
          pinkyPose = frame.getJointPose(rightHandSource.hand.get('pinky-finger-tip'), refSpace);
          leftWristPose = frame.getJointPose(leftHandSource.hand.get('wrist'), refSpace);
          
          if (rightWristPose && indexPose && pinkyPose && leftWristPose) {
            trackingLost = false;
          }
        }

        if (trackingLost) {
          if (this.state === 'FLYING') {
             this.state = 'HOVER';
             this.updateHUD('TRACKING LOST\nHovering... Show both hands');
          }
        } else {
          // --- GESTURE RECOGNITION (RIGHT FIST MATH) ---
          const dxI = rightWristPose.transform.position.x - indexPose.transform.position.x;
          const dyI = rightWristPose.transform.position.y - indexPose.transform.position.y;
          const dzI = rightWristPose.transform.position.z - indexPose.transform.position.z;
          const distIndex = Math.sqrt(dxI*dxI + dyI*dyI + dzI*dzI);

          const dxP = rightWristPose.transform.position.x - pinkyPose.transform.position.x;
          const dyP = rightWristPose.transform.position.y - pinkyPose.transform.position.y;
          const dzP = rightWristPose.transform.position.z - pinkyPose.transform.position.z;
          const distPinky = Math.sqrt(dxP*dxP + dyP*dyP + dzP*dzP);

          const isFist = distIndex < 0.11 && distPinky < 0.11;
          const isOpen = distIndex > 0.15 && distPinky > 0.15;

          // --- STATE MACHINE ---
          if (this.state === 'DISARMED' && isFist) {
            this.state = 'ARMED';
            this.updateHUD('ARMED\nHold hands still and open to FLY');
          } else if (this.state === 'ARMED' && isOpen) {
            this.state = 'FLYING';
            // SET ANCHORS! We read the position the moment the hand opens.
            this.anchorRight.copy(rightWristPose.transform.position);
            this.anchorLeft.copy(leftWristPose.transform.position);
            this.updateHUD('FLYING\nPush/Pull relative to anchor to move');
          } else if (this.state === 'FLYING' && isFist) {
            this.state = 'DISARMED'; 
            this.updateHUD('EMERGENCY STOP\nDisarmed');
          } else if (this.state === 'HOVER') {
            if (isOpen) {
              this.state = 'FLYING';
              // Reset anchors to prevent sudden lurching when tracking returns
              this.anchorRight.copy(rightWristPose.transform.position);
              this.anchorLeft.copy(leftWristPose.transform.position);
              this.updateHUD('FLYING\nTracking restored.');
            } else if (isFist) {
              this.state = 'DISARMED';
              this.updateHUD('SYSTEM OFFLINE\nMake right fist to ARM');
            }
          }

          // --- FLIGHT KINEMATICS: POSITIONAL DISPLACEMENT ---
          if (this.state === 'FLYING') {
            let curRight = rightWristPose.transform.position;
            let curLeft = leftWristPose.transform.position;

            // Calculate positional delta from the invisible anchor points
            let dRightZ = curRight.z - this.anchorRight.z; // Push forward is negative Z
            let dRightX = curRight.x - this.anchorRight.x; // Right is positive X
            let dLeftY  = curLeft.y - this.anchorLeft.y;   // Up is positive Y
            let dLeftX  = curLeft.x - this.anchorLeft.x;   // Left is negative X

            const posDeadzone = 0.04; // 4cm deadzone around anchor to allow for hand resting
            const posSensitivity = 12.0; // Multiplier: hand distance -> drone speed

            // Apply deadzones to eliminate micro-jitters
            let tz = Math.abs(dRightZ) > posDeadzone ? dRightZ + (dRightZ > 0 ? -posDeadzone : posDeadzone) : 0;
            let tx = Math.abs(dRightX) > posDeadzone ? dRightX + (dRightX > 0 ? -posDeadzone : posDeadzone) : 0;
            let ty = Math.abs(dLeftY) > posDeadzone ? dLeftY + (dLeftY > 0 ? -posDeadzone : posDeadzone) : 0;
            let tyaw = Math.abs(dLeftX) > posDeadzone ? dLeftX + (dLeftX > 0 ? -posDeadzone : posDeadzone) : 0;

            // Map deltas to velocities
            let targetLocalVZ = tz * posSensitivity;
            let targetLocalVX = tx * posSensitivity;
            let targetVY = ty * posSensitivity * 0.7; // Slightly less sensitive thrust
            let targetYawVelocity = -tyaw * this.maxYawSpeed; // Nerfed yaw

            // Clamp max speed to keep things sane
            const maxSpeed = 6.0; 
            targetLocalVZ = Math.max(-maxSpeed, Math.min(maxSpeed, targetLocalVZ));
            targetLocalVX = Math.max(-maxSpeed, Math.min(maxSpeed, targetLocalVX));
            targetVY = Math.max(-maxSpeed, Math.min(maxSpeed, targetVY));

            // Visual tilt is proportional to speed
            let targetPitch = targetLocalVZ * 0.1; 
            let targetRoll = -targetLocalVX * 0.1; 

            // CLAMP ACROBATICS: Drone cannot pitch or roll beyond safe parameters
            targetPitch = Math.max(-this.maxTilt, Math.min(this.maxTilt, targetPitch));
            targetRoll = Math.max(-this.maxTilt, Math.min(this.maxTilt, targetRoll));

            // Smooth interpolation
            const lerpFactor = 4.0 * dt; 
            this.droneTilt.x += (targetPitch - this.droneTilt.x) * lerpFactor;
            this.droneTilt.z += (targetRoll - this.droneTilt.z) * lerpFactor;
            this.velocity.y += (targetVY - this.velocity.y) * lerpFactor;
            
            this.droneYaw += targetYawVelocity * dt;
            this.data.drone.object3D.rotation.x = this.droneTilt.x;
            this.data.drone.object3D.rotation.z = this.droneTilt.z;

            // Use the actual velocity for translation, not the visually clamped tilt
            let localVZ = targetLocalVZ;
            let localVX = targetLocalVX;

            // Global conversion based on Yaw
            const cosY = Math.cos(this.droneYaw);
            const sinY = Math.sin(this.droneYaw);
            
            this.velocity.x = (localVX * cosY) + (localVZ * sinY);
            this.velocity.z = -(localVX * sinY) + (localVZ * cosY);
          }
        }

        if (this.state !== 'FLYING') {
          this.droneTilt.multiplyScalar(0.9);
          this.velocity.multiplyScalar(0.9);
          this.data.drone.object3D.rotation.x = this.droneTilt.x; 
          this.data.drone.object3D.rotation.z = this.droneTilt.z; 
        }

        this.data.drone.object3D.position.x += this.velocity.x * dt;
        this.data.drone.object3D.position.y += this.velocity.y * dt;
        this.data.drone.object3D.position.z += this.velocity.z * dt;

        if (this.data.drone.object3D.position.y < 0.1) {
          this.data.drone.object3D.position.y = 0.1;
          if (this.velocity.y < 0) this.velocity.y = 0;
        }

        this.data.drone.object3D.rotation.y = this.droneYaw;

        // --- TELEMETRY DATA PUSH TO HUD ---
        if (this.data.hudCompass && this.data.hudAlt && this.data.hudSpd) {
          let headingDegrees = -(this.droneYaw * 180 / Math.PI) % 360;
          if (headingDegrees < 0) headingDegrees += 360;
          let hdgStr = Math.round(headingDegrees).toString().padStart(3, '0');
          this.data.hudCompass.setAttribute('value', `HDG [ ${hdgStr} ]`);

          let altStr = this.data.drone.object3D.position.y.toFixed(1);
          this.data.hudAlt.setAttribute('value', `ALT\n${altStr}m`);

          let spdStr = this.velocity.length().toFixed(1);
          this.data.hudSpd.setAttribute('value', `SPD\n${spdStr}`);
        }

        // --- FIRST PERSON CAMERA TRACKING ---
        const dronePos = this.data.drone.object3D.position;
        const rigPos = this.data.rig.object3D.position;
        const rigRot = this.data.rig.object3D.rotation;
        
        const targetRigX = dronePos.x + Math.sin(this.droneYaw) * this.cameraOffset.distance;
        const targetRigZ = dronePos.z + Math.cos(this.droneYaw) * this.cameraOffset.distance;
        
        rigPos.set(targetRigX, dronePos.y + this.cameraOffset.height, targetRigZ);
        rigRot.set(0, this.droneYaw, 0);
      }
    });
  </script>
</head>
<body>
  <a-scene webxr="optionalFeatures: hand-tracking;" drone-flight-controller background="color: #000000">
    
    <!-- Upgraded Training Environment -->
    <a-entity environment="preset: contact; groundColor: #112; grid: 1x1; dressingAmount: 60"></a-entity>

    <!-- Training Course Rings -->
    <a-entity id="training-course">
      <a-torus position="0 1.5 -8" radius="1.2" tube="0.05" color="#00ffaa" rotation="0 0 0" opacity="0.8"></a-torus>
      <a-torus position="0 2.5 -16" radius="1.2" tube="0.05" color="#00ffaa" rotation="0 0 0" opacity="0.8"></a-torus>
      <a-torus position="3 2.0 -24" radius="1.2" tube="0.05" color="#00ffaa" rotation="0 30 0" opacity="0.8"></a-torus>
      <a-torus position="8 1.5 -30" radius="1.2" tube="0.05" color="#00ffaa" rotation="0 60 0" opacity="0.8"></a-torus>
      <a-torus position="15 3.0 -32" radius="1.2" tube="0.05" color="#00ffaa" rotation="0 90 0" opacity="0.8"></a-torus>
      <a-torus position="22 2.0 -28" radius="1.2" tube="0.05" color="#00ffaa" rotation="0 120 0" opacity="0.8"></a-torus>
    </a-entity>

    <!-- The Drone Entity -->
    <a-entity id="drone" position="0 1.5 -2">
      <!-- Core Body -->
      <a-box color="#222" width="0.2" height="0.08" depth="0.2"></a-box>
      <!-- Front Indicator (so you know which way is forward) -->
      <a-box color="#00ffaa" width="0.2" height="0.02" depth="0.05" position="0 0.04 -0.1"></a-box>

      <!-- Arms and Propellers -->
      <!-- Front Left -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="-0.15 0 -0.15" rotation="90 45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="-0.22 0.03 -0.22" opacity="0.8"></a-cylinder>
      
      <!-- Front Right -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="0.15 0 -0.15" rotation="90 -45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="0.22 0.03 -0.22" opacity="0.8"></a-cylinder>

      <!-- Back Left -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="-0.15 0 0.15" rotation="90 -45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="-0.22 0.03 0.22" opacity="0.8"></a-cylinder>

      <!-- Back Right -->
      <a-cylinder color="#555" radius="0.01" height="0.2" position="0.15 0 0.15" rotation="90 45 0"></a-cylinder>
      <a-cylinder class="propeller" color="#aaa" radius="0.1" height="0.005" position="0.22 0.03 0.22" opacity="0.8"></a-cylinder>
    </a-entity>

    <!-- Player Rig: This moves with the drone -->
    <a-entity id="rig" position="0 0 0">
      
      <!-- Camera / Head -->
      <a-camera id="head" position="0 1.6 0">
        
        <!-- J.A.R.V.I.S. Style Tactical HUD -->
        <a-entity id="iron-man-hud" position="0 0 -0.8">
          
          <!-- Center Reticle -->
          <a-ring color="#00ffff" radius-inner="0.03" radius-outer="0.035" opacity="0.6"></a-ring>
          <a-ring color="#00ffff" radius-inner="0.08" radius-outer="0.082" opacity="0.3" theta-length="60" theta-start="60"></a-ring>
          <a-ring color="#00ffff" radius-inner="0.08" radius-outer="0.082" opacity="0.3" theta-length="60" theta-start="240"></a-ring>
          <a-circle color="#ff3333" radius="0.003" opacity="0.8"></a-circle>

          <!-- Framing Lines -->
          <a-entity line="start: -0.4 0.3 0; end: 0.4 0.3 0; color: #00ffff; opacity: 0.3"></a-entity>
          <a-entity line="start: -0.4 -0.3 0; end: 0.4 -0.3 0; color: #00ffff; opacity: 0.3"></a-entity>

          <!-- Top: Compass / Heading -->
          <a-text id="hud-compass" 
                  position="0 0.32 0" 
                  value="HDG [ 000 ]" 
                  align="center" 
                  width="1.2" 
                  color="#00ffff" 
                  font="monoid"
                  opacity="0.9">
          </a-text>

          <!-- Right: Altitude -->
          <a-text id="hud-alt" 
                  position="0.45 0 0" 
                  value="ALT\n0.0m" 
                  align="center" 
                  width="1.2" 
                  color="#00ffff" 
                  font="monoid"
                  opacity="0.9">
          </a-text>

          <!-- Left: Speed -->
          <a-text id="hud-spd" 
                  position="-0.45 0 0" 
                  value="SPD\n0.0" 
                  align="center" 
                  width="1.2" 
                  color="#00ffff" 
                  font="monoid"
                  opacity="0.9">
          </a-text>

          <!-- Bottom: State Warnings -->
          <a-text id="hud-state" 
                  position="0 -0.35 0" 
                  value="INITIALIZING..." 
                  align="center" 
                  width="0.9" 
                  color="#ff3333" 
                  font="monoid">
          </a-text>

        </a-entity>
      </a-camera>

      <!-- Hand Models -->
      <a-entity id="leftHand" hand-tracking-controls="hand: left; modelColor: #00ffff;"></a-entity>
      <a-entity id="rightHand" hand-tracking-controls="hand: right; modelColor: #00ffff;"></a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
